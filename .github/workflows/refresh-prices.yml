name: Refresh Stock Prices

on:
  schedule:
    - cron: '45 3 * * 1-5'       # 9:15 AM IST, Mon–Fri (market open)
    - cron: '*/15 4-10 * * 1-5'  # Every 15 mins, 9:30 AM–4:15 PM IST, Mon–Fri
    - cron: '*/30 4-10 * * 0,6'  # Every 30 mins, 10 AM–4:30 PM IST, Sat–Sun
  workflow_dispatch:              # Manual trigger from GitHub Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas openpyxl

      - name: Fetch prices
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas openpyxl requests
          python scripts/fetch_prices.py

      - name: Fetch extended data (Daily at 3:45 UTC / 9:15 AM IST)
        if: github.event.schedule == '45 3 * * 1-5' || github.event_name == 'workflow_dispatch'
        run: python scripts/fetch_extended_data.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json stocks.json data/portfolio.xlsx
          git diff --staged --quiet || (git commit -m "chore: refresh prices $(date -u +'%Y-%m-%d %H:%M UTC')" && git push)
