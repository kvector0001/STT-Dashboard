name: Refresh Stock Prices

on:
  schedule:
    - cron: '38 3 * * 1-5'             # 9:08 AM IST — wake scheduler / keepalive
    - cron: '47 3 * * 1-5'             # 9:17 AM IST — daily extended data
    - cron: '7,22,37,52 4-10 * * 1-5'  # market hours — odd minutes to avoid GitHub peak-load drops
  workflow_dispatch:            # Manual trigger from GitHub Actions tab
  repository_dispatch:          # Trigger from browser Refresh button
    types: [refresh-prices]

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas openpyxl

      - name: Fetch prices
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas openpyxl requests
          python scripts/fetch_prices.py

      - name: Fetch extended data (Daily at 3:47 UTC / 9:17 AM IST)
        if: github.event.schedule == '47 3 * * 1-5' || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'
        run: python scripts/fetch_extended_data.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json stocks.json data/portfolio.xlsx
          # Always commit — even empty — so GitHub sees repo activity and keeps cron alive
          if git diff --staged --quiet; then
            git commit --allow-empty -m "chore: keepalive $(date -u +'%Y-%m-%d %H:%M UTC')"
          else
            git commit -m "chore: refresh prices $(date -u +'%Y-%m-%d %H:%M UTC')"
          fi
          git push
