name: Keepalive

on:
  schedule:
    - cron: '33 3 * * 1-5'   # 9:03 AM IST Mon–Fri — odd minute to avoid GitHub peak-load drops

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Wake up scheduler
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keepalive $(date -u +'%Y-%m-%d')"
          git push
