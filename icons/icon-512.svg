<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1a1228"/>

  <!-- Grid lines -->
  <line x1="48" y1="120" x2="464" y2="120" stroke="#3d2860" stroke-width="2"/>
  <line x1="48" y1="200" x2="464" y2="200" stroke="#3d2860" stroke-width="2"/>
  <line x1="48" y1="280" x2="464" y2="280" stroke="#3d2860" stroke-width="2"/>
  <line x1="48" y1="360" x2="464" y2="360" stroke="#3d2860" stroke-width="2"/>

  <!-- Chart line (stock going up) -->
  <polyline
    points="48,370 96,340 144,350 200,280 248,292 296,200 352,168 416,108 464,88"
    fill="none" stroke="#7c3aed" stroke-width="9" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Gradient fill under line -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <polygon
    points="48,370 96,340 144,350 200,280 248,292 296,200 352,168 416,108 464,88 464,420 48,420"
    fill="url(#g)"/>

  <!-- Candlestick accents -->
  <rect x="88" y="310" width="20" height="36" rx="4" fill="#22c55e"/>
  <line x1="98" y1="296" x2="98" y2="310" stroke="#22c55e" stroke-width="4"/>
  <line x1="98" y1="346" x2="98" y2="362" stroke="#22c55e" stroke-width="4"/>

  <rect x="184" y="322" width="20" height="32" rx="4" fill="#ef4444"/>
  <line x1="194" y1="308" x2="194" y2="322" stroke="#ef4444" stroke-width="4"/>
  <line x1="194" y1="354" x2="194" y2="368" stroke="#ef4444" stroke-width="4"/>

  <rect x="288" y="172" width="20" height="36" rx="4" fill="#22c55e"/>
  <line x1="298" y1="158" x2="298" y2="172" stroke="#22c55e" stroke-width="4"/>
  <line x1="298" y1="208" x2="298" y2="224" stroke="#22c55e" stroke-width="4"/>

  <rect x="400" y="90" width="20" height="36" rx="4" fill="#22c55e"/>
  <line x1="410" y1="76" x2="410" y2="90" stroke="#22c55e" stroke-width="4"/>
  <line x1="410" y1="126" x2="410" y2="142" stroke="#22c55e" stroke-width="4"/>

  <!-- Rupee symbol bottom right -->
  <text x="392" y="490" font-family="Arial,sans-serif" font-size="64" font-weight="bold" fill="#7c3aed" opacity="0.9">₹</text>
</svg>
