<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" rx="36" fill="#1a1228"/>

  <!-- Grid lines -->
  <line x1="24" y1="48"  x2="168" y2="48"  stroke="#3d2860" stroke-width="1"/>
  <line x1="24" y1="80"  x2="168" y2="80"  stroke="#3d2860" stroke-width="1"/>
  <line x1="24" y1="112" x2="168" y2="112" stroke="#3d2860" stroke-width="1"/>
  <line x1="24" y1="144" x2="168" y2="144" stroke="#3d2860" stroke-width="1"/>

  <!-- Chart line (stock going up) -->
  <polyline
    points="24,140 44,128 64,132 84,108 100,112 116,80 132,68 152,44 168,36"
    fill="none" stroke="#7c3aed" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Gradient fill under line -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <polygon
    points="24,140 44,128 64,132 84,108 100,112 116,80 132,68 152,44 168,36 168,160 24,160"
    fill="url(#g)"/>

  <!-- Candlestick accents -->
  <rect x="38" y="118" width="8" height="14" rx="2" fill="#22c55e"/>
  <line x1="42" y1="114" x2="42" y2="118" stroke="#22c55e" stroke-width="2"/>
  <line x1="42" y1="132" x2="42" y2="136" stroke="#22c55e" stroke-width="2"/>

  <rect x="70" y="122" width="8" height="12" rx="2" fill="#ef4444"/>
  <line x1="74" y1="118" x2="74" y2="122" stroke="#ef4444" stroke-width="2"/>
  <line x1="74" y1="134" x2="74" y2="138" stroke="#ef4444" stroke-width="2"/>

  <rect x="110" y="70" width="8" height="14" rx="2" fill="#22c55e"/>
  <line x1="114" y1="66" x2="114" y2="70" stroke="#22c55e" stroke-width="2"/>
  <line x1="114" y1="84" x2="114" y2="88" stroke="#22c55e" stroke-width="2"/>

  <!-- Rupee symbol -->
  <text x="148" y="176" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#7c3aed" opacity="0.9">₹</text>
</svg>
